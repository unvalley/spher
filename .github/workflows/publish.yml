name: Publish package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate release tag
        id: release
        run: |
          tag="${TAG_NAME}"

          case "${tag}" in
            v*)
              version="${tag#v}"
              ;;
            *)
              echo "Tag ${tag} must start with v."
              exit 1
              ;;
          esac

          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if [ -z "${version}" ] || [ "${tag}" = "${version}" ]; then
            echo "Tag ${tag} does not contain a version."
            exit 1
          fi

          if [ "${package_version}" != "${version}" ]; then
            echo "Tag ${tag} does not match package version ${package_version}."
            exit 1
          fi

          git fetch --tags --force origin
          tag_sha="$(git rev-list -n 1 "${tag}" 2>/dev/null || true)"
          if [ -z "${tag_sha}" ]; then
            echo "Tag ${tag} does not exist."
            exit 1
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "${tag_sha}" origin/main; then
            echo "Tag ${tag} points to ${tag_sha}, which is not contained in origin/main."
            exit 1
          fi

          published=false
          if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
            echo "${package_name}@${version} is already published."
            published=true
          fi

          prerelease=false
          case "${version}" in
            *-*)
              prerelease=true
              ;;
          esac

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "published=${published}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify
        run: pnpm check

      - name: Publish package
        if: steps.release.outputs.published != 'true'
        run: npm publish --provenance

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          RELEASE_PRERELEASE: ${{ steps.release.outputs.prerelease }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${TAG_NAME} already exists."
            exit 0
          fi

          args=(
            "${TAG_NAME}"
            "--verify-tag"
            "--title"
            "${RELEASE_PACKAGE_NAME} ${RELEASE_VERSION}"
            "--generate-notes"
          )

          if [ "${RELEASE_PRERELEASE}" = "true" ]; then
            args+=("--prerelease" "--latest=false")
          fi

          gh release create "${args[@]}"
