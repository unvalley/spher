name: Create release tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.1 or v0.1.1)."
        required: true
        type: string

permissions:
  actions: write
  contents: write

jobs:
  tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate release version
        id: release
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          raw_version="${RELEASE_VERSION}"
          version="${raw_version#v}"
          package_name="$(node -p "require('./package.json').name")"

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version ${raw_version} is not a valid release version."
            exit 1
          fi

          if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
            echo "${package_name}@${version} is already published."
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists."
            exit 1
          fi

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Update package version
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          package_version="$(node -p "require('./package.json').version")"

          if [ "${package_version}" = "${RELEASE_VERSION}" ]; then
            echo "package.json is already at ${RELEASE_VERSION}."
            exit 0
          fi

          npm pkg set "version=${RELEASE_VERSION}"
          pnpm install --lockfile-only

      - name: Verify
        run: pnpm check

      - name: Commit release version
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- package.json pnpm-lock.yaml; then
            echo "No version changes to commit."
            exit 0
          fi

          git add package.json pnpm-lock.yaml
          git commit -m "chore: release ${RELEASE_TAG}"
          git push origin HEAD:main

      - name: Create release tag
        env:
          RELEASE_PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          git tag -a "${RELEASE_TAG}" -m "${RELEASE_PACKAGE_NAME} ${RELEASE_VERSION}"
          git push origin "${RELEASE_TAG}"

      - name: Trigger publish workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "publish.yml",
              ref: context.ref.replace("refs/heads/", ""),
              inputs: {
                tag: "${{ steps.release.outputs.tag }}"
              }
            });
